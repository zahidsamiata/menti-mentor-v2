name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # next build: standalone output, tüm sayfalar static — backend'e bağlanmıyor.
      # NEXT_PUBLIC_API_URL tanımsız → client.ts 'http://localhost:3000' fallback kullanır.
      - name: Build
        run: npx next build
