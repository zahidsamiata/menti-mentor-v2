##
# Menti-Mentor SaaS — CI Pipeline
#
# Monorepo yapısı:
#   - Backend  (submodule): "Menti Mentör proje/"
#   - Frontend (regular dir): "menti-mentor-frontend/"
#
# Tüm yollar sabit yazılmıştır; env-var genişlemesi with: bloklarında
# güvenilmez olabileceğinden kaldırıldı.
##

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'

jobs:
  # ── Backend: TypeScript + Prisma + Lint ──────────────────────────────────────
  backend-check:
    name: Backend — TS + Prisma + Lint
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu ve submodule'ları çek
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Node.js ${{ env.NODE_VERSION }} kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Bağımlılıkları kur
        working-directory: 'Menti Mentör proje'
        run: npm ci

      - name: Prisma client üret
        working-directory: 'Menti Mentör proje'
        run: npx prisma generate

      - name: TypeScript kontrolü (src)
        working-directory: 'Menti Mentör proje'
        run: npx tsc --noEmit

      - name: TypeScript kontrolü (tests)
        working-directory: 'Menti Mentör proje'
        run: npx tsc --noEmit -p tsconfig.test.json

      - name: ESLint
        working-directory: 'Menti Mentör proje'
        run: npm run lint
        continue-on-error: true

  # ── Frontend: TypeScript + Next.js Build ─────────────────────────────────────
  frontend-check:
    name: Frontend — TS + Build
    runs-on: ubuntu-latest

    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Node.js ${{ env.NODE_VERSION }} kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Bağımlılıkları kur
        working-directory: 'menti-mentor-frontend'
        run: npm ci

      - name: TypeScript kontrolü
        working-directory: 'menti-mentor-frontend'
        run: npx tsc --noEmit

      - name: Next.js production build (lint + tip kontrolü dahil)
        working-directory: 'menti-mentor-frontend'
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

  # ── Entegrasyon Testleri: Vitest + Supertest + PostgreSQL ────────────────────
  integration-tests:
    name: Integration Tests (Auth + Matching + Admin)
    runs-on: ubuntu-latest
    needs: [backend-check]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: menti_mentor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/menti_mentor_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/menti_mentor_test
      JWT_SECRET: test-secret-min-32-chars-for-ci-pipeline!!
      PLATFORM_ADMIN_KEY: test-platform-key-ci

    steps:
      - name: Repoyu ve submodule'ları çek
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Node.js ${{ env.NODE_VERSION }} kur
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Bağımlılıkları kur
        working-directory: 'Menti Mentör proje'
        run: npm ci

      - name: Prisma client üret
        working-directory: 'Menti Mentör proje'
        run: npx prisma generate

      - name: Test DB migration uygula
        working-directory: 'Menti Mentör proje'
        run: npx prisma migrate deploy

      - name: Entegrasyon testlerini çalıştır
        working-directory: 'Menti Mentör proje'
        run: npm test

      - name: Test coverage yükle (opsiyonel)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: 'Menti Mentör proje/coverage'
          retention-days: 7
